# Test profile — isolated in-memory H2, no shared file DB
# This overrides all other application*.properties during tests.

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway creates the schema fresh in-memory for every test run
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT (dummy values for context load test)
jwt.secret=testSecretKeyForTestingPurposesOnly1234
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000
jwt.refresh-cookie.name=refresh_token
jwt.refresh-cookie.secure=false

# Suppress noisy output during tests
spring.h2.console.enabled=false
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=WARN
