# Local profile

# Datasource — H2 in PostgreSQL compatibility mode
# MODE=PostgreSQL makes H2 understand PostgreSQL SQL syntax (BIGSERIAL, NUMERIC, etc.)
# so the same Flyway migrations that run on prod PostgreSQL work here too.
spring.datasource.url=jdbc:h2:file:./database/h2/retail-db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 browser console — accessible at http://localhost:8080/h2-console
# JDBC URL to enter in the console: jdbc:h2:file:./database/h2/retail-db;MODE=PostgreSQL
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Flyway (local)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Let Flyway own schema management — validate JPA mappings against migrations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Use H2Dialect — Hibernate connects to H2, not real PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Local logging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG