spring.application.name=hor

# Default to local when no profile is explicitly set
spring.profiles.default=local

# Server
server.port=${SERVER_PORT:8080}

# Shared upload limits
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}

# ──────────────────────────────────────────────────────────
# JWT Configuration
# ──────────────────────────────────────────────────────────

# Signing secret (minimum 32 characters)
jwt.secret=${JWT_SECRET:yourVeryStrongSecretKeyHereMinimum32Characters}

# Access token: 15 minutes (in milliseconds)
jwt.access-token.expiration=${JWT_ACCESS_EXPIRATION:900000}

# Refresh token: 7 days (in milliseconds)
jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ──────────────────────────────────────────────────────────
# Token Cookies (both are HttpOnly — browser stores, JS cannot access)
# ──────────────────────────────────────────────────────────

# Access token cookie name (Path=/, 15 min)
jwt.access-cookie.name=${JWT_ACCESS_COOKIE_NAME:access_token}

# Refresh token cookie name (Path=/api/v1/auth, 7 days)
jwt.refresh-cookie.name=${JWT_REFRESH_COOKIE_NAME:refresh_token}

# Set to false for local HTTP dev; true in production (HTTPS required)
jwt.refresh-cookie.secure=${JWT_REFRESH_COOKIE_SECURE:false}

# ──────────────────────────────────────────────────────────
# Swagger / OpenAPI
# ──────────────────────────────────────────────────────────
springdoc.swagger-ui.path=${SWAGGER_UI_PATH:/swagger-ui.html}
springdoc.api-docs.path=${API_DOCS_PATH:/api-docs}