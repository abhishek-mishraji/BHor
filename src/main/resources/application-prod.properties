# Production profile

# Datasource (from env)
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Disable H2 console in prod
spring.h2.console.enabled=false

# Flyway (enabled in prod)
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}

# JPA / Hibernate (driven from environment)
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

# JWT (read from env / secret manager)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File upload limits
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:10MB}

# Production logging (values come from env via LOG_LEVEL_ vars)
logging.level.org.springframework.security=${LOG_LEVEL_ORG_SPRING_SECURITY:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_ORG_HIBERNATE_SQL:WARN}
logging.level.org.springdoc=${LOG_LEVEL_ORG_SPRINGDOC:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}